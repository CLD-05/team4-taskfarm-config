name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      prod:
        description: "Run prod deployment"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Sync prod ArgoCD apps
    runs-on: ubuntu-latest

    steps:
      - name: Require prod approval input
        run: |
          if [ "${{ inputs.prod }}" != "true" ]; then
            echo "prod input must be checked to run this workflow."
            exit 1
          fi

      - name: Checkout config repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate prod kustomize overlays
        run: |
          kubectl kustomize manifests/user/overlays/prod > /tmp/user-prod.yaml
          kubectl kustomize manifests/admin/overlays/prod > /tmp/admin-prod.yaml
          kubectl kustomize manifests/monitoring > /tmp/monitoring-prod.yaml

      - name: Sync prod apps in ArgoCD
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          if [ -z "$ARGOCD_SERVER" ] || [ -z "$ARGOCD_AUTH_TOKEN" ]; then
            echo "ARGOCD_SERVER and ARGOCD_AUTH_TOKEN repository secrets are required."
            exit 1
          fi

          server="${ARGOCD_SERVER%/}"
          case "$server" in
            http://*|https://*) ;;
            *) server="https://$server" ;;
          esac

          for app in taskfarm-user-prod taskfarm-admin-prod taskfarm-monitoring-prod; do
            echo "Syncing ${app}"
            curl -fsS -X POST "${server}/api/v1/applications/${app}/sync" \
              -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"prune":false}'
          done
