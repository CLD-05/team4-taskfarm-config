apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: taskfarm-prod

resources:
  - ../../base
  - namespace.yaml
  - externalsecret.yaml
  - secretstore.yaml

patchesStrategicMerge:
  - patch-deployment.yaml
  - patch-configmap.yaml

images:
  - name: taskfarm-app-img
    newName: 000000000000.dkr.ecr.ap-northeast-2.amazonaws.com/team4-prod-taskfarm
    newTag: latest
