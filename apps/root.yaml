# App-of-Apps: 이 root가 apps/ 하위 Application들을 관리.
# ArgoCD에 이 root만 등록하면 user/admin × dev/prod가 줄줄이 생성됨.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskfarm-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CLD-05/team4-taskfarm-config.git
    targetRevision: main
    path: apps
    directory:
      recurse: false
      include: '{user-dev.yaml,admin-dev.yaml,user-prod.yaml,admin-prod.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
