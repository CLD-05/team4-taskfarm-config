apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskfarm-root-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CLD-05/team4-taskfarm-config.git
    targetRevision: main
    path: apps
    directory:
      recurse: false
      include: '{user-dev.yaml,admin-dev.yaml,common.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true