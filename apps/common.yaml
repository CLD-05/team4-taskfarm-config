apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskfarm-common
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CLD-05/team4-taskfarm-config.git
    targetRevision: main
    path: manifests/common
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
