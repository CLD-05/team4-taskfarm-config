apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskfarm-admin-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CLD-05/team4-taskfarm-config.git
    targetRevision: main
    path: manifests/admin/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: taskfarm-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
