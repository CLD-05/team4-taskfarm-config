# =====================================================================
# [담당3] admin 앱 - dev 환경 Application
# =====================================================================
# 목표: ArgoCD가 manifests/admin/overlays/dev 를 동기화.
# 작성할 것: user-dev.yaml과 동일 구조, path=manifests/admin/overlays/dev,
#            name=taskfarm-admin-dev
# =====================================================================

# TODO: 여기에 admin-dev Application 작성

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskfarm-admin-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/CLD-05/team4-taskfarm-config.git
    targetRevision: main
    path: manifests/admin/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: taskfarm-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
