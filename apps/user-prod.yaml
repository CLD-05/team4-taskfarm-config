apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskfarm-user-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CLD-05/team4-taskfarm-config.git
    targetRevision: main
    path: manifests/user/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: taskfarm-prod
  syncPolicy:
    # prod는 automated 끔 — 수동 sync (안전)
    syncOptions:
      - CreateNamespace=false
