apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskfarm-admin
  labels:
    app.kubernetes.io/name: taskfarm-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taskfarm-admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskfarm-admin
    spec:
      containers:
        - name: taskfarm-admin
          image: taskfarm-admin
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: taskfarm-admin-config
            - secretRef:
                name: taskfarm-admin-secret
          readinessProbe:
            httpGet:
              path: /admin/actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /admin/actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
