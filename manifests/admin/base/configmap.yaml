apiVersion: v1
kind: ConfigMap
metadata:
  name: taskfarm-admin-config
data:
  DB_PORT: "3306"
  DB_NAME: "taskfarm"
  REDIS_PORT: "6379"
  REDIS_SSL_ENABLED: "false"
  JPA_DDL_AUTO: "validate"
  AWS_REGION: "ap-northeast-2"
  SERVER_SERVLET_CONTEXT_PATH: "/admin"
  # MFA: 켜기는 공통, 키 ID는 환경별(overlay configMapGenerator)에서 주입
  MFA_KMS_ENABLED: "true"
  # MFA_KMS_KEY_ID 는 base에서 제거 — dev/prod overlay가 각자 환경 키로 merge
 