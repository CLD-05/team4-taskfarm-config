# admin prod ingress — /admin 경로. 보안상 내부망/특정 IP 제한 권장.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskfarm-admin
  labels:
    app: taskfarm-admin
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    # ⚠️ admin은 노출 최소화 — 회사 IP만 허용 권장
    # alb.ingress.kubernetes.io/inbound-cidrs: <office-ip>/32
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
spec:
  ingressClassName: alb
  rules:
    - host: admin.taskfarm.site
      http:
        paths:
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: taskfarm-admin
                port:
                  number: 80
