apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskfarm-admin
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:000000000000:certificate/replace-me
    alb.ingress.kubernetes.io/inbound-cidrs: 203.0.113.0/24
    alb.ingress.kubernetes.io/healthcheck-path: /admin/actuator/health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/tags: Team=team4,Project=taskfarm,Component=admin
spec:
  ingressClassName: alb
  rules:
    - host: taskfarm.site
      http:
        paths:
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: taskfarm-admin
                port:
                  number: 80
