apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml

images:
  - name: taskfarm-admin
    newName: 000000000000.dkr.ecr.ap-northeast-2.amazonaws.com/team4-prod-taskfarm-admin
    newTag: prod

patches:
  - path: patch-prod.yaml

configMapGenerator:
  - name: taskfarm-admin-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=team4-prod-rds.endpoint.replace-me
      - DB_REPLICA_HOST=team4-prod-rds-replica.endpoint.replace-me

generatorOptions:
  disableNameSuffixHash: true

commonLabels:
  app.kubernetes.io/environment: prod
