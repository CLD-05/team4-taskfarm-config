apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: taskfarm-user
  labels:
    release: kube-prometheus-stack

spec:
  selector:
    matchLabels:
      app: taskfarm-user

  namespaceSelector:
    matchNames: ["taskfarm-dev", "taskfarm", "taskfarm-prod"]
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s