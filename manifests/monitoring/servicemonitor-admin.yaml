apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: taskfarm-admin
  labels:
    release: kube-prometheus-stack

spec:
  selector:
    matchLabels:
      app: taskfarm-admin
  namespaceSelector:
    matchNames: ["taskfarm-dev", "taskfarm-prod"]
  endpoints:
    - port: http
      path: /admin/actuator/prometheus
      interval: 30s