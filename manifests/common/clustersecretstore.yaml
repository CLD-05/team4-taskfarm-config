apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: taskfarm-cluster-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      # auth 블록 없음 = ESO 컨트롤러 SA(external-secrets/external-secrets)의
      # IRSA 권한을 그대로 사용. 앱 SA에 IRSA annotation 달 필요 없음.
      # 이 SA에는 infra의 external-secrets.tf가 secretsmanager Get/Describe 권한 부여.