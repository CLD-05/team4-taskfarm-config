apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: taskfarm-dev
resources:
  - ../../base
  - namespace.yaml
  # ⚠️ ingress 없음 (dev=port-forward)
patches:
  - path: patch-dev.yaml
    target:
      kind: Deployment
      name: taskfarm-user
images:
  - name: taskfarm-user-img
    newName: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/team4-dev-taskfarm-user
    newTag: latest   # CI가 git-sha로 갱신 (kustomize edit set image taskfarm-user-img=...:<tag>)
configMapGenerator:
  - name: taskfarm-user-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=dev,worker
      # TODO: dev RDS/Redis 엔드포인트 (terraform output)
      - DB_HOST=PLACEHOLDER-dev-rds-endpoint
      - REDIS_HOST=PLACEHOLDER-dev-redis-endpoint
