apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: taskfarm-dev
resources:
- ../../base
- secretstore.yaml
- externalsecret.yaml
- ingress.yaml
  # ⚠️ ingress 없음 (dev=port-forward)
patches:
- path: patch-dev.yaml
  target:
    kind: Deployment
    name: taskfarm-user
images:
- name: taskfarm-user-img
  newName: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/team4-dev-taskfarm-user
  newTag: dev-0e3629d
configMapGenerator:
- behavior: merge
  literals:
  - SPRING_PROFILES_ACTIVE=dev,worker
  name: taskfarm-user-config
