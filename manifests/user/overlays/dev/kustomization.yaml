apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: taskfarm-dev
  # secretstore.yaml 제거 — ClusterSecretStore(monitoring에서 단일 생성) 사용
resources:
- ../../base
- externalsecret.yaml
- ingress.yaml
patches:
- path: patch-dev.yaml
  target:
    kind: Deployment
    name: taskfarm-user
images:
- name: taskfarm-user-img
  newName: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/team4-dev-taskfarm-user
  newTag: dev-7af8f35
configMapGenerator:
- behavior: merge
  literals:
  - SPRING_PROFILES_ACTIVE=dev,worker
  name: taskfarm-user-config
