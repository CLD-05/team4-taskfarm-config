# =====================================================================
# [담당1] user overlay dev
# =====================================================================
# 목표: base를 가져와 dev에 맞게 패치.
#
# 작성할 것:
#  - resources: [../../base]
#  - images: ECR 경로 + newTag: dev (CI가 갱신할 자리)
#  - patches: patch-dev.yaml (Deployment 타겟)
#  - configMapGenerator (behavior: merge): dev 환경변수 덮어쓰기
#     예) SPRING_PROFILES_ACTIVE, DB_HOST(dev RDS), REDIS_HOST(dev Redis)
#
# 주의:
#  - ⚠️ dev엔 ingress.yaml 없음! (port-forward 접근) — resources에 ingress 넣지 말 것
#  - DB_HOST 등은 terraform output의 dev 엔드포인트로 (합의 후 채움)
#
# 참고: kustomize images / configMapGenerator merge
# =====================================================================

# TODO: 여기에 dev kustomization 작성
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: taskfarm-dev

resources:
  - ../../base

images:
  - name: taskfarm-user
    newName: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/team4-dev-taskfarm-user
    newTag: dev

patches:
  - path: patch-dev.yaml

configMapGenerator:
  - name: taskfarm-user-config
    behavior: merge
    options:
      disableNameSuffixHash: true
    literals:
      - SPRING_PROFILES_ACTIVE=dev,worker
      # 아래: 식별자(코드 결정) + 계정-리전 공통 접미사(team5/6에서 확인)로 조립. 재배포 후 terraform output로 검증
      - DB_HOST=team4-dev-mysql.cx482c6a63zp.ap-northeast-2.rds.amazonaws.com
      - REDIS_HOST=team4-dev-redis.50cal1.ng.0001.apn2.cache.amazonaws.com