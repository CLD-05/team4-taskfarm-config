apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskfarm-user
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: taskfarm-user
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
