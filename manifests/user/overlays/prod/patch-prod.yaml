# =====================================================================
# [담당1] user prod 패치
# =====================================================================
# 목표: prod는 고가용성. replicas 2+, 리소스 크게.
#
# 작성할 것:
#  - kind: Deployment, name: taskfarm-user
#  - spec.replicas: 2 이상 (HA). HPA 붙이면 HPA가 관리
#  - resources 크게 (requests cpu 500m/mem 1Gi 등)
# =====================================================================

# TODO: 여기에 prod 패치 작성
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskfarm-user
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: taskfarm-user
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits:   { memory: 2Gi }