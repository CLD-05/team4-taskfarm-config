apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: taskfarm-prod
resources:
  - ../../base
  - secretstore.yaml
  - externalsecret.yaml
  - ingress.yaml
patches:
  - path: patch-prod.yaml
    target:
      kind: Deployment
      name: taskfarm-user
images:
  - name: taskfarm-user-img
    newName: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/team4-prod-taskfarm-user
    newTag: latest
configMapGenerator:
  - name: taskfarm-user-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=prod,worker
      - DB_HOST=PLACEHOLDER-prod-rds-endpoint
      - DB_REPLICA_HOST=PLACEHOLDER-prod-rds-reader-endpoint
      - REDIS_HOST=PLACEHOLDER-prod-redis-endpoint
