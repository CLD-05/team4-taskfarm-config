apiVersion: kustomize.config.k8s.io/v1
kind: Kustomization
# ⚠️ externalsecret/secretstore는 overlay에 있음 (환경별 시크릿 경로가 달라서)
# ⚠️ ingress도 prod overlay에만 (dev=port-forward)
resources:
  - serviceaccount.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
labels:
  - pairs:
      app.kubernetes.io/part-of: taskfarm
      app.kubernetes.io/component: user
    includeSelectors: false
