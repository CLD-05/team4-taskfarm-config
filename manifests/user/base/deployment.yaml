apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskfarm-user
  labels:
    app: taskfarm-user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskfarm-user
  template:
    metadata:
      labels:
        app: taskfarm-user
    spec:
      serviceAccountName: taskfarm-user-sa
      containers:
        - name: taskfarm-user
          # 이미지 placeholder — overlay에서 newName/newTag로 치환 (CI가 newTag 갱신)
          image: taskfarm-user-img
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: taskfarm-user-config
            - configMapRef:
                name: taskfarm-endpoints
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: taskfarm-user-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskfarm-user-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: taskfarm-user-secret
                  key: JWT_SECRET
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: taskfarm-user-secret
                  key: GEMINI_API_KEY
          # Spring Boot actuator health group (readiness/liveness 분리) — 팀원 방식 유지
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 240
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 1000m
              memory: 2Gi
