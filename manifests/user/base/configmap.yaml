apiVersion: v1
kind: ConfigMap
metadata:
  name: taskfarm-user-config
data:
  # 공통(환경 무관). 환경별(DB_HOST 등)은 overlay에서 덮어씀.
  DB_PORT: "3306"
  DB_NAME: "taskfarm"
  REDIS_PORT: "6379"
  REDIS_SSL_ENABLED: "false"
  JPA_DDL_AUTO: "validate"
  AWS_REGION: "ap-northeast-2"
  # 환경별 (overlay patch에서 채움):
  # DB_HOST, REDIS_HOST, SPRING_PROFILES_ACTIVE
