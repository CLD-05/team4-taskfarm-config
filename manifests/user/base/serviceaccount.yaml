apiVersion: v1
kind: ServiceAccount
metadata:
  name: taskfarm-user-sa
  labels:
    app: taskfarm-user
  # ESO SecretStore가 이 SA의 IRSA로 Secrets Manager에 접근.
  # 인프라 external-secrets.tf의 IRSA role ARN을 여기 annotation으로 달거나,
  # ESO를 클러스터 단위(ClusterSecretStore)로 쓰면 SA별 annotation 불필요.
  # 팀 ESO 설치 방식에 맞춰 확정.
  # annotations:
  # eks.amazonaws.com/role-arn: <인프라 ESO IRSA role ARN>
