# ESO SecretStore — Secrets Manager 사용 (인프라 ESO IAM 권한과 일치).
# 팀원 버전은 ParameterStore였으나, 인프라 external-secrets.tf가
# secretsmanager 권한만 주므로 SecretsManager로 통일.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: taskfarm-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: taskfarm-user-sa
