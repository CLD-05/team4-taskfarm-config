# =====================================================================
# [담당1 + 담당3 패턴협의] user 앱 - ExternalSecret (ESO)
# =====================================================================
# 목표: AWS Secrets Manager의 비밀 → K8s Secret 동기화. deployment가 이걸 secretRef로 씀.
# 전제: ESO 설치됨(platform-addons/external-secrets.tf) + ESO IRSA 준비됨.
#
# 작성할 것:
#  - kind: ExternalSecret (apiVersion: external-secrets.io/v1beta1)
#  - metadata.name
#  - spec.refreshInterval (예: 1h)
#  - spec.secretStoreRef: 인프라가 만든 SecretStore/ClusterSecretStore 이름  ← 담당3·인프라 합의
#  - spec.target.name: taskfarm-user-secret  (deployment의 secretRef와 일치!)
#  - spec.data: [{secretKey(K8s측 키), remoteRef(Secrets Manager 위치)}]
#     주입할 비밀: JWT_SECRET, GEMINI_API_KEY, DB_USERNAME, DB_PASSWORD (+REDIS_PASSWORD?)
#
# 주의:
#  - ⚠️ SecretStore 이름·Secrets Manager 키 구조는 인프라(ESO 설치)와 합의 후 확정
#  - target.name을 deployment의 secretRef.name과 반드시 일치
#
# 참고: https://external-secrets.io/latest/api/externalsecret/
# =====================================================================

