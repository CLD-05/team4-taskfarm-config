# ESO: AWS Secrets Manager → K8s Secret(taskfarm-user-secret).
# deployment의 secretKeyRef가 이 Secret을 참조.
# ⚠️ 인프라 external-secrets.tf가 secretsmanager:GetSecretValue 권한을 주므로
#    provider는 SecretsManager (ParameterStore 아님 — IAM 권한과 일치).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: taskfarm-user-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: taskfarm-secret-store
    kind: SecretStore
  target:
    name: taskfarm-user-secret
    creationPolicy: Owner
  data:
    # remoteRef.key = Secrets Manager 시크릿 이름,
    # property = 그 시크릿(JSON) 안의 필드. 시크릿을 JSON으로 저장한 경우.
    - secretKey: DB_USERNAME
      remoteRef:
        key: team4/taskfarm/dev/db
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: team4/taskfarm/dev/db
        property: password
    - secretKey: JWT_SECRET
      remoteRef:
        key: team4/taskfarm/dev/jwt-secret
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: team4/taskfarm/dev/gemini-api-key
