# =====================================================================
# [담당1 + 담당3 패턴협의] user 앱 - ExternalSecret (ESO)
# =====================================================================
# 목표: AWS Secrets Manager의 비밀 → K8s Secret 동기화. deployment가 이걸 secretRef로 씀.
# 전제: ESO 설치됨(platform-addons/external-secrets.tf) + ESO IRSA 준비됨.
#
# 작성할 것:
#  - kind: ExternalSecret (apiVersion: external-secrets.io/v1beta1)
#  - metadata.name
#  - spec.refreshInterval (예: 1h)
#  - spec.secretStoreRef: 인프라가 만든 SecretStore/ClusterSecretStore 이름  ← 담당3·인프라 합의
#  - spec.target.name: taskfarm-user-secret  (deployment의 secretRef와 일치!)
#  - spec.data: [{secretKey(K8s측 키), remoteRef(Secrets Manager 위치)}]
#     주입할 비밀: JWT_SECRET, GEMINI_API_KEY, DB_USERNAME, DB_PASSWORD (+REDIS_PASSWORD?)
#
# 주의:
#  - ⚠️ SecretStore 이름·Secrets Manager 키 구조는 인프라(ESO 설치)와 합의 후 확정
#  - target.name을 deployment의 secretRef.name과 반드시 일치
#
# 참고: https://external-secrets.io/latest/api/externalsecret/
# =====================================================================

# TODO: 여기에 ExternalSecret 작성
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taskfarm-user-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager 
    kind: ClusterSecretStore
  target:
    name: taskfarm-user-secret
    creationPolicy: Owner
  data:
    # ✅ 유일하게 실제 존재하는 팀 시크릿 (secrets 모듈: secret_names=["gemini-api-key"], base_path=team4/taskfarm)
    #    ⚠️ 경로에 env(dev) 포함 → prod overlay에선 team4/taskfarm/prod/gemini-api-key 로 patch 필요
    - { secretKey: GEMINI_API_KEY, remoteRef: { key: team4/taskfarm/dev/gemini-api-key } }

  # ─── 아래 항목은 현재 인프라에 소스가 없어 비활성 (인프라 합의/추가 후 연결) ───
  #  - JWT: secrets 모듈에 jwt 시크릿 추가 필요 (현재 gemini-api-key만 존재)
  #  - DB 계정: RDS 관리 시크릿 또는 secrets 모듈에 db-credentials 추가 후 연결
  #  - Redis 인증: elasticache에 auth/RBAC 미설정이라 현재 불필요 (도입 시 추가)